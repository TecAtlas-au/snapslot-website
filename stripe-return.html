<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Returning to SnapSlot…</title>
  <meta name="robots" content="noindex" />
  <!-- Stripe Connect return/refresh target. Stripe redirects the in-app browser
       here (https://snapslot.com.au/stripe-return); we immediately bounce to the
       snapslot:// deep link so expo-web-browser's openAuthSessionAsync detects
       the custom scheme and dismisses the browser. The visible message is the
       fallback for any device where the deep link doesn't auto-fire. -->
  <script>
    // Fire the deep link as early as possible, before paint where supported.
    window.location.replace('snapslot://stripe-return');
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #17182A;
      color: #F5F0E8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .mark { font-size: 40px; font-weight: 800; color: #D4AF37; margin-bottom: 24px; }
    .mark sup { font-size: 0.45em; vertical-align: super; }
    h1 { font-size: 22px; font-weight: 700; color: #F5F0E8; margin-bottom: 12px; }
    p { font-size: 15px; color: #9E9E9E; max-width: 360px; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      background: linear-gradient(90deg, #E1BC4A 0%, #D4AF37 50%, #C49C21 100%);
      color: #1A1A1A;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      padding: 14px 26px;
      border-radius: 26px;
    }
  </style>
</head>
<body>
  <div class="mark">⚡ SnapSlot<sup>™</sup></div>
  <h1>Onboarding complete</h1>
  <p>You can close this window and return to SnapSlot. If the app didn't reopen automatically, tap below.</p>
  <a class="btn" href="snapslot://stripe-return">Return to SnapSlot</a>

  <script>
    // Backup attempt shortly after load for browsers that ignore the early
    // location.replace (e.g. if the scheme handler wasn't ready pre-paint).
    setTimeout(function () {
      window.location.href = 'snapslot://stripe-return';
    }, 400);
  </script>
</body>
</html>
