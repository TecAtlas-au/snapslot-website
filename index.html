<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapSlot™</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #1A1A2E;
      color: #F5F0E8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 48px;
      font-weight: 800;
      color: #D4AF37;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 14px;
      color: #9E9E9E;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 64px;
    }
    h1 {
      font-size: 48px;
      font-weight: 800;
      color: #F5F0E8;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 16px;
      max-width: 600px;
    }
    .subtitle {
      font-size: 18px;
      color: #9E9E9E;
      text-align: center;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 48px;
    }
    .waitlist {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 80px;
    }
    .waitlist input {
      background: #16213E;
      border: 1px solid #2A2A4A;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 16px;
      color: #F5F0E8;
      outline: none;
      width: 100%;
    }
    .waitlist input::placeholder { color: #555; }
    .waitlist input:focus { border-color: #D4AF37; }
    .waitlist button {
      background: #D4AF37;
      color: #1A1A2E;
      border: none;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s;
    }
    .waitlist button:hover { opacity: 0.9; }
    .success {
      display: none;
      color: #4CAF7D;
      font-size: 15px;
      text-align: center;
    }
    footer {
      color: #555;
      font-size: 13px;
      text-align: center;
      line-height: 2;
    }
    footer a { color: #9E9E9E; text-decoration: none; }
    footer a:hover { color: #D4AF37; }
  </style>
</head>
<body>
  <div class="logo">
    <span>⚡</span>
    <span>SnapSlot™</span>
  </div>
  <div class="tagline">Coming Soon</div>
  <h1>Something big is coming.</h1>
  <p class="subtitle">Be the first to know when SnapSlot launches in your area.</p>
  <div class="waitlist">
    <input type="email" id="email" placeholder="your@email.com" />
    <button onclick="joinWaitlist()">Join the Waitlist</button>
    <p class="success" id="success">You're on the list. We'll be in touch. 👍</p>
  </div>
  <footer>
    <a href="mailto:support@snapslot.com.au">support@snapslot.com.au</a><br />
    SnapSlot™ is operated by TecAtlas (ABN 96 955 951 165)<br />
    Geelong, Victoria, Australia
  </footer>
  <script>
    function joinWaitlist() {
      const email = document.getElementById('email').value;
      if (!email || !email.includes('@')) {
        alert('Please enter a valid email address.');
        return;
      }
      document.getElementById('success').style.display = 'block';
      document.getElementById('email').value = '';
    }
  </script>
</body>
</html>
